name: Benchmark

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        type: choice
        options:
          - smoke
          - full
        default: smoke
  pull_request:
    paths:
      - '.github/workflows/benchmark.yml'
      - 'benchmark/**'
      - 'package.json'

jobs:
  smoke:
    if: github.event_name == 'pull_request' || github.event.inputs.mode == 'smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Smoke benchmark (3 cheapest tasks)
        env:
          BENCHMARK_TASK_LIMIT: 3
        run: npm run benchmark:smoke

  full:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Full benchmark (all 20 tasks)
        run: npm run benchmark
      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: regenerate AUDIT-BENCHMARK.md from full run'
          file_pattern: 'audit-benchmark.md benchmark/results/**'
